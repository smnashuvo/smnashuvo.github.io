name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        run: npm run build

      - name: Extract URLs from sitemap(s)
        run: |
          echo "Extracting URLs..."
          if [ -f dist/sitemap-index.xml ]; then
            grep -oP '(?<=<loc>).*?(?=</loc>)' dist/sitemap-index.xml > sitemap_list.txt
            > urls.txt
            while read sitemap; do
              FILE=$(basename "$sitemap")
              if [ -f "dist/$FILE" ]; then
                grep -oP '(?<=<loc>).*?(?=</loc>)' "dist/$FILE" >> urls.txt
              fi
            done < sitemap_list.txt
          elif [ -f dist/sitemap.xml ]; then
            grep -oP '(?<=<loc>).*?(?=</loc>)' dist/sitemap.xml > urls.txt
          fi
          sort -u urls.txt -o urls.txt

      - name: Submit to IndexNow
        run: |
          echo "Submitting to IndexNow..."
          if [ ! -s urls.txt ]; then
            echo "No URLs found. Skipping."
            exit 0
          fi
          URLS=$(paste -sd, urls.txt | sed 's/,/","/g')
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"smnazmul.com\",
              \"key\": \"37bb52f50ad9443dae26a3a66a1d25a6\",
              \"keyLocation\": \"https://smnazmul.com/37bb52f50ad9443dae26a3a66a1d25a6.txt\",
              \"urlList\": [\"$URLS\"]
            }")
          echo "IndexNow response code: $RESPONSE"
          if [[ "$RESPONSE" -ne 200 && "$RESPONSE" -ne 202 ]]; then
            echo "Error: IndexNow submission failed"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4